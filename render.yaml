services:
  - type: web
    name: harutool
    runtime: node
    plan: free
    buildCommand: npm run verify
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: SITE_URL
        sync: false
      - key: GOOGLE_SITE_VERIFICATION
        sync: false
      - key: NAVER_SITE_VERIFICATION
        sync: false
      - key: ADSENSE_CLIENT
        sync: false
      - key: ADSENSE_TOP_SLOT
        sync: false
      - key: ADSENSE_SIDE_SLOT
        sync: false
