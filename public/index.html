<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{TITLE}}</title>
    <meta name="description" content="{{DESCRIPTION}}" />
    <meta name="robots" content="{{ROBOTS}}" />
    {{ADSENSE_META}}
    {{SEARCH_VERIFICATION}}
    <link rel="canonical" href="{{CANONICAL}}" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="{{TITLE}}" />
    <meta property="og:description" content="{{DESCRIPTION}}" />
    <meta property="og:url" content="{{CANONICAL}}" />
    <meta property="og:locale" content="ko_KR" />
    <meta name="theme-color" content="#f6f7f2" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="preload" href="/app.js?v=12" as="script" />
    <link rel="stylesheet" href="/styles.css?v=7" />
    <script type="application/ld+json">
      {{STRUCTURED_DATA}}
    </script>
  </head>
  <body>
    <script>window.HARUTOOL_CONFIG = {{APP_CONFIG}};</script>
    <header class="site-header">
      <a class="brand" href="/" aria-label="하루툴 홈">
        <span class="brand-mark">ㅎ</span>
        <span>하루툴</span>
      </a>
      <nav aria-label="주요 메뉴">
        <a href="/#all-tools">모든 도구</a>
        <a href="/business">사업자 계산</a>
        <a href="/#about">소개</a>
      </nav>
    </header>

    <main id="app" data-route='{{ROUTE}}'>{{INITIAL_CONTENT}}</main>

    <footer>
      <div>
        <a class="brand footer-brand" href="/"><span class="brand-mark">ㅎ</span><span>하루툴</span></a>
        <p>귀찮은 계산과 정리를 빠르고 간단하게.</p>
      </div>
      <div class="footer-links">
        <a href="/about">소개</a>
        <a href="/terms">이용약관</a>
        <a href="/privacy">개인정보처리방침</a>
        <a href="/contact">문의</a>
        <button class="footer-button" id="cookie-settings" type="button">쿠키 설정</button>
      </div>
      <p class="copyright">© 2026 하루툴</p>
    </footer>
    <div id="toast" role="status" aria-live="polite"></div>
    <div class="consent-banner" id="consent-banner" hidden>
      <div>
        <strong>쿠키 사용 안내</strong>
        <p>서비스 운영과 광고 제공을 위해 선택 쿠키를 사용할 수 있습니다. 필수 기능은 선택과 관계없이 작동합니다.</p>
      </div>
      <div class="consent-actions">
        <button class="btn btn-secondary" id="consent-essential" type="button">필수만 허용</button>
        <button class="btn btn-primary" id="consent-accept" type="button">선택 쿠키 동의</button>
      </div>
    </div>
    {{CLOUDFLARE_WEB_ANALYTICS}}
    <script src="/app.js?v=12" defer></script>
  </body>
</html>
